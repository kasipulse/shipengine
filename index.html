<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipgate Engine Importers | Premium Engines & Gearboxes</title>
    <style>
        /* CSS is embedded here so it never fails to load */
        :root {
            --navy: #002366;
            --orange: #ff4500;
            --steel: #e2e8f0;
            --dark: #1e293b;
        }
        body { font-family: sans-serif; margin: 0; color: var(--dark); }
        .site-header { background: var(--navy); color: white; padding: 1rem 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; }
        .brand { color: white; font-weight: bold; text-decoration: none; font-size: 1.5rem; }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; }
        .hero { padding: 80px 20px; text-align: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://res.cloudinary.com/dwxgkbuln/image/upload/v1782581117/Toyota-Turbo-Engine_jmly6e.jpg'); background-size: cover; background-position: center; color: white; }
        .btn { padding: 12px 25px; background: var(--orange); color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .services { padding: 50px 20px; background: var(--steel); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container nav">
            <a href="/" class="brand">Shipgate Engine Importers</a>
            <ul class="nav-links">
                <li><a href="#services">Services</a></li>
                <li><a href="/shop.html">Shop Engines</a></li>
            </ul>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>Low-Mileage Engines & Gearboxes</h1>
            <p>Imported the Right Way.</p>
            <a href="/shop.html" class="btn">View Available Engines</a>
        </section>
        <section id="services" class="services">
            <div class="container grid">
                <div class="card"><h3>Engine Sourcing</h3><p>Hand-picked units.</p></div>
                <div class="card"><h3>Quality Testing</h3><p>Compression tested.</p></div>
                <div class="card"><h3>Nationwide Delivery</h3><p>Fast dispatch.</p></div>
            </div>
        </section>
    </main>
</body>
</html>
