<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Inventory | Shipgate Engine Importers</title>
    <style>
        :root { --navy: #002366; --orange: #ff4500; --steel: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--steel); margin: 0; }
        .shop-header { background: var(--navy); color: white; padding: 2rem 0; text-align: center; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .engine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-content { padding: 20px; }
        .price { color: var(--orange); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header class="shop-header">
        <h1>Engine Inventory</h1>
        <a href="index.html" style="color: white;">← Back to Home</a>
    </header>

    <div class="container">
        <div class="engine-grid" id="engineContainer"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabase = createClient(
            'https://fjrzxwxvrxobxfdtxeit.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqcnp4d3h2cnhvYnhmZHR4ZWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjgzODMsImV4cCI6MjA5Nzk0NDM4M30.0LbRWawujxTJ1ptn0vW-QSqtZyWQhCTu6bipwFK2FlY'
        )

        async function loadInventory() {
            const { data, error } = await supabase.from('engines').select('*')

            if (error) { console.error("Fetch error:", error); return; }

            const container = document.getElementById('engineContainer')
            
            container.innerHTML = data.map(engine => {
                // Log the actual object to your browser console to see real column names
                console.log("Engine Data Object:", engine);
                
                // Use Object.values or specific keys if you find them in the console
                return `
                    <div class="product-card">
                        <img src="${engine.image_url || ''}" alt="Engine">
                        <div class="card-content">
                            <h3>${engine.engine_name || 'Unnamed Engine'}</h3>
                            <p>Data found in console.log</p>
                            <p class="price">R ${engine.price || '0'}</p>
                        </div>
                    </div>
                `
            }).join('')
        }

        loadInventory()
    </script>
</body>
</html>
